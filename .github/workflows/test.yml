name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install gitleaks
        run: brew install gitleaks

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test tests/

      - name: CLI smoke
        run: bun cli.ts --help
